<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="案件随手记">
<meta name="theme-color" content="#6366f1">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>调解案件随手记</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #6366f1;
  --primary-light: #818cf8;
  --primary-dark: #4f46e5;
  --primary-bg: #eef2ff;
  --accent: #f59e0b;
  --success: #10b981;
  --success-bg: #ecfdf5;
  --danger: #ef4444;
  --danger-bg: #fef2f2;
  --gray-50: #f8fafc;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --gray-300: #cbd5e1;
  --gray-400: #94a3b8;
  --gray-500: #64748b;
  --gray-600: #475569;
  --gray-700: #334155;
  --gray-800: #1e293b;
  --gray-900: #0f172a;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 30px rgba(0,0,0,0.08), 0 4px 8px rgba(0,0,0,0.04);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
  background: var(--gray-50);
  color: var(--gray-800);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  min-height: 100dvh;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: calc(var(--safe-top) + 12px) 20px 12px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.header h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.header-stats {
  font-size: 13px;
  opacity: 0.85;
  font-weight: 500;
}

.search-bar {
  position: relative;
  margin-bottom: 12px;
}

.search-bar input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  border: none;
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.18);
  color: white;
  font-size: 15px;
  outline: none;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: background 0.2s;
}

.search-bar input::placeholder { color: rgba(255,255,255,0.6); }
.search-bar input:focus { background: rgba(255,255,255,0.28); }

.search-bar svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.6);
}

/* Filters */
.filters {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 2px;
}

.filters::-webkit-scrollbar { display: none; }

.filter-tag {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  border: none;
  cursor: pointer;
  background: rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.85);
  transition: all 0.2s;
  white-space: nowrap;
}

.filter-tag.active {
  background: white;
  color: var(--primary-dark);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* Main Content */
.main {
  padding: 16px 16px calc(90px + var(--safe-bottom));
}

/* Month Nav */
.month-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 16px;
}

.month-nav button {
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 50%;
  background: white;
  color: var(--gray-600);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-sm);
  transition: all 0.2s;
}

.month-nav button:active { transform: scale(0.92); }

.month-nav span {
  font-size: 16px;
  font-weight: 600;
  color: var(--gray-700);
  min-width: 100px;
  text-align: center;
}

/* Case Cards */
.case-list { display: flex; flex-direction: column; gap: 12px; }

.case-card {
  background: white;
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.case-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
}

.case-card.type-withdraw::before { background: var(--accent); }
.case-card.type-mediate::before { background: var(--primary); }
.case-card.done::before { background: var(--success); }

.case-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 12px;
}

.case-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--gray-800);
  flex: 1;
  line-height: 1.4;
}

.case-type-badge {
  flex-shrink: 0;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  margin-left: 10px;
}

.badge-withdraw {
  background: #fef3c7;
  color: #92400e;
}

.badge-mediate {
  background: var(--primary-bg);
  color: var(--primary-dark);
}

.case-progress {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}

.progress-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  background: var(--gray-50);
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.progress-item:active { transform: scale(0.97); }

.progress-item.checked {
  background: var(--success-bg);
}

.check-circle {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid var(--gray-300);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}

.progress-item.checked .check-circle {
  background: var(--success);
  border-color: var(--success);
}

.check-circle svg {
  opacity: 0;
  transition: opacity 0.2s;
}

.progress-item.checked .check-circle svg { opacity: 1; }

.progress-label {
  font-size: 13px;
  color: var(--gray-500);
  font-weight: 500;
}

.progress-item.checked .progress-label {
  color: var(--success);
}

.progress-time {
  font-size: 11px;
  color: var(--gray-400);
  margin-top: 1px;
}

.case-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.case-note {
  font-size: 13px;
  color: var(--gray-400);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.case-date {
  font-size: 12px;
  color: var(--gray-400);
  margin-left: 8px;
  flex-shrink: 0;
}

.case-actions {
  display: flex;
  gap: 4px;
  margin-left: 8px;
}

.case-actions button {
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--gray-400);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.case-actions button:active { background: var(--gray-100); }
.case-actions .delete-btn:active { background: var(--danger-bg); color: var(--danger); }

/* Empty State */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--gray-400);
}

.empty-state svg { margin-bottom: 16px; opacity: 0.4; }

.empty-state p {
  font-size: 15px;
  font-weight: 500;
}

.empty-state .sub { font-size: 13px; margin-top: 4px; }

/* Progress Bar */
.case-progress-bar {
  height: 3px;
  background: var(--gray-100);
  border-radius: 2px;
  margin-bottom: 12px;
  overflow: hidden;
}

.case-progress-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--primary-light), var(--success));
  transition: width 0.3s ease;
}

/* FAB */
.fab {
  position: fixed;
  bottom: calc(24px + var(--safe-bottom));
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  border: none;
  box-shadow: 0 6px 20px rgba(99,102,241,0.4);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 90;
  transition: all 0.2s;
}

.fab:active { transform: scale(0.9); }

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.modal-overlay.show { display: flex; }

.modal {
  background: white;
  width: 100%;
  max-width: 500px;
  max-height: 90dvh;
  border-radius: 20px 20px 0 0;
  padding: 0;
  overflow: hidden;
  animation: slideUp 0.3s ease;
  padding-bottom: var(--safe-bottom);
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--gray-300);
  border-radius: 2px;
  margin: 10px auto;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px 16px;
}

.modal-header h2 {
  font-size: 18px;
  font-weight: 700;
  color: var(--gray-800);
}

.modal-close {
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 50%;
  background: var(--gray-100);
  color: var(--gray-500);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-body {
  padding: 0 20px 20px;
  overflow-y: auto;
  max-height: calc(90dvh - 80px - var(--safe-bottom));
}

.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--gray-600);
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-size: 15px;
  color: var(--gray-800);
  background: white;
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus { border-color: var(--primary); }

textarea.form-input {
  resize: none;
  height: 80px;
}

.type-selector {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.type-option {
  padding: 12px;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius-sm);
  text-align: center;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--gray-500);
}

.type-option.active-withdraw {
  border-color: var(--accent);
  background: #fffbeb;
  color: #92400e;
}

.type-option.active-mediate {
  border-color: var(--primary);
  background: var(--primary-bg);
  color: var(--primary-dark);
}

.form-submit {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}

.form-submit:active { transform: scale(0.98); opacity: 0.9; }

/* Confirm Dialog */
.confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}

.confirm-overlay.show { display: flex; }

.confirm-box {
  background: white;
  border-radius: var(--radius);
  padding: 24px;
  max-width: 300px;
  width: 100%;
  text-align: center;
  animation: scaleIn 0.2s ease;
}

@keyframes scaleIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.confirm-box p {
  font-size: 16px;
  font-weight: 600;
  color: var(--gray-800);
  margin-bottom: 6px;
}

.confirm-box .sub {
  font-size: 14px;
  color: var(--gray-500);
  margin-bottom: 20px;
}

.confirm-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.confirm-btns button {
  padding: 12px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

.btn-cancel {
  background: var(--gray-100);
  color: var(--gray-600);
}

.btn-danger {
  background: var(--danger);
  color: white;
}

/* Toast */
.toast {
  position: fixed;
  top: calc(var(--safe-top) + 60px);
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--gray-800);
  color: white;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  z-index: 400;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Standalone mode (added to home screen) */
@media all and (display-mode: standalone) {
  .header {
    padding-top: calc(var(--safe-top) + 16px);
  }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>案件随手记</h1>
    <div class="header-stats" id="stats"></div>
  </div>
  <div class="search-bar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="搜索案件..." autocomplete="off">
  </div>
  <div class="filters" id="filters">
    <button class="filter-tag active" data-filter="all">全部</button>
    <button class="filter-tag" data-filter="withdraw">撤诉</button>
    <button class="filter-tag" data-filter="mediate">调解</button>
    <button class="filter-tag" data-filter="unfinished">未结案</button>
    <button class="filter-tag" data-filter="no-material">缺材料</button>
    <button class="filter-tag" data-filter="no-case-number">未立案号</button>
    <button class="filter-tag" data-filter="no-judge">未交法官</button>
  </div>
</div>

<div class="main">
  <div class="month-nav">
    <button id="prevMonth">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span id="monthLabel"></span>
    <button id="nextMonth">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
  <div class="case-list" id="caseList"></div>
</div>

<button class="fab" id="addBtn">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h2 id="modalTitle">新增案件</h2>
      <button class="modal-close" id="modalClose">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">当事人简称 *</label>
        <input type="text" class="form-input" id="caseName" placeholder="例如：张某物业案" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">案件类型</label>
        <div class="type-selector">
          <div class="type-option" id="typeWithdraw" data-type="withdraw">撤诉</div>
          <div class="type-option" id="typeMediate" data-type="mediate">调解</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">备注</label>
        <textarea class="form-input" id="caseNote" placeholder="可选，记录重要信息"></textarea>
      </div>
      <button class="form-submit" id="formSubmit">保存</button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p>确认删除？</p>
    <div class="sub">删除后不可恢复</div>
    <div class="confirm-btns">
      <button class="btn-cancel" id="confirmCancel">取消</button>
      <button class="btn-danger" id="confirmDelete">删除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ Data Layer ============
const STORAGE_KEY = 'case_tracker_data';

function loadCases() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch { return []; }
}

function saveCases(cases) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cases));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// ============ State ============
let cases = loadCases();
let currentFilter = 'all';
let searchQuery = '';
let viewYear, viewMonth;
let editingId = null;
let deletingId = null;
let selectedType = 'mediate';

// Init to current month
const now = new Date();
viewYear = now.getFullYear();
viewMonth = now.getMonth();

// ============ DOM refs ============
const $ = id => document.getElementById(id);
const caseList = $('caseList');
const searchInput = $('searchInput');
const monthLabel = $('monthLabel');
const modalOverlay = $('modalOverlay');
const confirmOverlay = $('confirmOverlay');
const statsEl = $('stats');

// ============ Rendering ============
const STEPS = [
  { key: 'materialReady', label: '材料交齐' },
  { key: 'caseNumberSet', label: '立调解案号' },
  { key: 'judgeDelivered', label: '已交法官' },
  { key: 'closed', label: '已结案' },
];

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatMonthDay(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

function getFiltered() {
  let list = cases.filter(c => {
    const d = new Date(c.createdAt);
    return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
  });

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(c => c.name.toLowerCase().includes(q) || (c.note && c.note.toLowerCase().includes(q)));
  }

  switch (currentFilter) {
    case 'withdraw': list = list.filter(c => c.type === 'withdraw'); break;
    case 'mediate': list = list.filter(c => c.type === 'mediate'); break;
    case 'unfinished': list = list.filter(c => !c.closed); break;
    case 'no-material': list = list.filter(c => !c.materialReady); break;
    case 'no-case-number': list = list.filter(c => !c.caseNumberSet); break;
    case 'no-judge': list = list.filter(c => !c.judgeDelivered); break;
  }

  // Sort: unclosed first, then by creation date desc
  list.sort((a, b) => {
    if (a.closed && !b.closed) return 1;
    if (!a.closed && b.closed) return -1;
    return b.createdAt - a.createdAt;
  });

  return list;
}

function updateStats() {
  const monthCases = cases.filter(c => {
    const d = new Date(c.createdAt);
    return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
  });
  const closed = monthCases.filter(c => c.closed).length;
  statsEl.textContent = `${monthCases.length} 件 / 已结 ${closed}`;
}

function render() {
  const list = getFiltered();
  updateStats();
  monthLabel.textContent = `${viewYear}年${viewMonth + 1}月`;

  if (list.length === 0) {
    caseList.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p>${searchQuery ? '没有找到匹配的案件' : '本月暂无案件'}</p>
        <div class="sub">${searchQuery ? '试试其他关键词' : '点击右下角 + 新增'}</div>
      </div>`;
    return;
  }

  caseList.innerHTML = list.map(c => {
    const doneCount = STEPS.filter(s => c[s.key]).length;
    const progress = (doneCount / STEPS.length) * 100;
    const isDone = !!c.closed;
    const typeClass = isDone ? 'done' : `type-${c.type}`;
    const badgeClass = c.type === 'withdraw' ? 'badge-withdraw' : 'badge-mediate';
    const typeLabel = c.type === 'withdraw' ? '撤诉' : '调解';

    return `
    <div class="case-card ${typeClass}" data-id="${c.id}">
      <div class="case-card-header">
        <div class="case-name">${esc(c.name)}</div>
        <span class="case-type-badge ${badgeClass}">${typeLabel}</span>
      </div>
      <div class="case-progress-bar"><div class="case-progress-bar-fill" style="width:${progress}%"></div></div>
      <div class="case-progress">
        ${STEPS.map(s => `
          <div class="progress-item ${c[s.key] ? 'checked' : ''}" data-case="${c.id}" data-step="${s.key}">
            <div class="check-circle">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div>
              <div class="progress-label">${s.label}</div>
              ${c[s.key + 'At'] ? `<div class="progress-time">${formatDate(c[s.key + 'At'])}</div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
      <div class="case-footer">
        <div class="case-note">${c.note ? esc(c.note) : ''}</div>
        <div class="case-date">${formatMonthDay(c.createdAt)}</div>
        <div class="case-actions">
          <button class="edit-btn" data-id="${c.id}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="delete-btn" data-id="${c.id}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ============ Events ============

// Toggle progress step
caseList.addEventListener('click', e => {
  const item = e.target.closest('.progress-item');
  if (item) {
    const id = item.dataset.case;
    const step = item.dataset.step;
    const c = cases.find(x => x.id === id);
    if (!c) return;
    if (c[step]) {
      c[step] = false;
      c[step + 'At'] = null;
    } else {
      c[step] = true;
      c[step + 'At'] = Date.now();
    }
    saveCases(cases);
    render();
    showToast(c[step] ? '已勾选' : '已取消');
    return;
  }

  const editBtn = e.target.closest('.edit-btn');
  if (editBtn) {
    openEdit(editBtn.dataset.id);
    return;
  }

  const deleteBtn = e.target.closest('.delete-btn');
  if (deleteBtn) {
    deletingId = deleteBtn.dataset.id;
    confirmOverlay.classList.add('show');
    return;
  }
});

// Filters
$('filters').addEventListener('click', e => {
  const tag = e.target.closest('.filter-tag');
  if (!tag) return;
  document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
  tag.classList.add('active');
  currentFilter = tag.dataset.filter;
  render();
});

// Search
let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = searchInput.value.trim();
    render();
  }, 200);
});

// Month nav
$('prevMonth').addEventListener('click', () => {
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  render();
});

$('nextMonth').addEventListener('click', () => {
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  render();
});

// Add button
$('addBtn').addEventListener('click', () => openAdd());

// Modal
function openAdd() {
  editingId = null;
  $('modalTitle').textContent = '新增案件';
  $('caseName').value = '';
  $('caseNote').value = '';
  selectedType = 'mediate';
  updateTypeUI();
  $('formSubmit').textContent = '保存';
  modalOverlay.classList.add('show');
  setTimeout(() => $('caseName').focus(), 300);
}

function openEdit(id) {
  const c = cases.find(x => x.id === id);
  if (!c) return;
  editingId = id;
  $('modalTitle').textContent = '编辑案件';
  $('caseName').value = c.name;
  $('caseNote').value = c.note || '';
  selectedType = c.type;
  updateTypeUI();
  $('formSubmit').textContent = '更新';
  modalOverlay.classList.add('show');
}

function closeModal() {
  modalOverlay.classList.remove('show');
}

$('modalClose').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => {
  if (e.target === modalOverlay) closeModal();
});

// Type selector
$('typeWithdraw').addEventListener('click', () => { selectedType = 'withdraw'; updateTypeUI(); });
$('typeMediate').addEventListener('click', () => { selectedType = 'mediate'; updateTypeUI(); });

function updateTypeUI() {
  $('typeWithdraw').className = 'type-option' + (selectedType === 'withdraw' ? ' active-withdraw' : '');
  $('typeMediate').className = 'type-option' + (selectedType === 'mediate' ? ' active-mediate' : '');
}

// Form submit
$('formSubmit').addEventListener('click', () => {
  const name = $('caseName').value.trim();
  if (!name) {
    showToast('请填写当事人简称');
    $('caseName').focus();
    return;
  }

  if (editingId) {
    const c = cases.find(x => x.id === editingId);
    if (c) {
      c.name = name;
      c.type = selectedType;
      c.note = $('caseNote').value.trim();
    }
  } else {
    cases.push({
      id: genId(),
      name,
      type: selectedType,
      note: $('caseNote').value.trim(),
      materialReady: false, materialReadyAt: null,
      caseNumberSet: false, caseNumberSetAt: null,
      judgeDelivered: false, judgeDeliveredAt: null,
      closed: false, closedAt: null,
      createdAt: Date.now(),
    });
  }

  saveCases(cases);
  closeModal();
  render();
  showToast(editingId ? '已更新' : '已新增');
});

// Confirm delete
$('confirmCancel').addEventListener('click', () => {
  confirmOverlay.classList.remove('show');
  deletingId = null;
});

$('confirmDelete').addEventListener('click', () => {
  cases = cases.filter(c => c.id !== deletingId);
  saveCases(cases);
  confirmOverlay.classList.remove('show');
  deletingId = null;
  render();
  showToast('已删除');
});

confirmOverlay.addEventListener('click', e => {
  if (e.target === confirmOverlay) {
    confirmOverlay.classList.remove('show');
    deletingId = null;
  }
});

// Toast
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// ============ Init ============
render();

// ============ PWA Service Worker ============
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
